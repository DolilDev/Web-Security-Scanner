<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WebSec Scanner - Report Viewer</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;padding:20px}</style>
</head>
<body>
  <h1>WebSec Scanner - Report Viewer</h1>
  <p>To view a report, enter the report filename (e.g. report.json):</p>
  <input id="name" placeholder="report.json" />
  <button id="load">Load</button>
  <pre id="out" style="white-space:pre-wrap;border:1px solid #ddd;padding:10px;margin-top:10px;max-height:60vh;overflow:auto"></pre>
  <script>
    document.getElementById('load').addEventListener('click', async ()=>{
      const name = document.getElementById('name').value || 'report.json';
      const resp = await fetch('/dashboard/report/' + encodeURIComponent(name));
      if (!resp.ok) { document.getElementById('out').textContent = 'Error: ' + resp.status; return; }
      const text = await resp.text();
      try { const json = JSON.parse(text); document.getElementById('out').textContent = JSON.stringify(json, null, 2); }
      catch(e){ document.getElementById('out').textContent = text }
    })
  </script>
</body>
</html>
