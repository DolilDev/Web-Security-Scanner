<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WebSec Scanner - Report Viewer</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;padding:20px}</style>
</head>
<body>
  <h1>WebSec Scanner - Report Viewer</h1>
  <p>Open saved JSON reports generated by the scanner. Use the report list or enter a filename directly.</p>
  <section aria-labelledby="reports-heading">
    <h2 id="reports-heading">Available reports</h2>
    <button id="refresh">Refresh list</button>
    <ul id="reports"></ul>
  </section>
  <section aria-labelledby="load-heading">
    <h2 id="load-heading">Load a report</h2>
    <label for="name">Report filename</label>
    <input id="name" placeholder="report.json" aria-label="Report filename" />
    <button id="load">Load</button>
  </section>
  <section aria-labelledby="summary-heading">
    <h2 id="summary-heading">Report summary</h2>
    <div id="summary" aria-live="polite"></div>
  </section>
  <section aria-labelledby="output-heading">
    <h2 id="output-heading">Raw report output</h2>
    <pre id="out" style="white-space:pre-wrap;border:1px solid #ddd;padding:10px;margin-top:10px;max-height:60vh;overflow:auto" aria-live="polite"></pre>
  </section>
  <script>
    function renderSummary(data, name){
      const summary = document.getElementById('summary');
      if (!data || !data.results || !Array.isArray(data.results)){
        summary.textContent = `Loaded report ${name}: no structured results found.`;
        return;
      }
      const counts = data.results.reduce((acc, item) => {
        const status = item.status || 'unknown';
        acc[status] = (acc[status] || 0) + 1;
        return acc;
      }, {});
      const lines = [
        `Report: ${name}`,
        `Total checks: ${data.results.length}`,
        ...Object.entries(counts).map(([status, count]) => `${status}: ${count}`)
      ];
      summary.textContent = lines.join('\n');
    }

    async function loadReport(name){
      const out = document.getElementById('out');
      out.textContent = 'Loading report...';
      const resp = await fetch('/dashboard/report/' + encodeURIComponent(name));
      if (!resp.ok) {
        out.textContent = 'Error: ' + resp.status + ' - ' + resp.statusText;
        document.getElementById('summary').textContent = '';
        return;
      }
      const json = await resp.json();
      renderSummary(json, name);
      out.textContent = JSON.stringify(json, null, 2);
    }

    document.getElementById('load').addEventListener('click', ()=>{
      const name = document.getElementById('name').value.trim() || 'report.json';
      loadReport(name);
    });

    document.getElementById('refresh').addEventListener('click', refreshReports);

    async function refreshReports(){
      const resp = await fetch('/dashboard/reports');
      const ul = document.getElementById('reports');
      ul.innerHTML = '';
      if (!resp.ok) {
        ul.innerHTML = '<li>Unable to load reports.</li>';
        return;
      }
      const data = await resp.json();
      const reports = data.reports || [];
      if (reports.length === 0) {
        ul.innerHTML = '<li>No saved reports found.</li>';
        return;
      }
      reports.forEach(r=>{
        const li = document.createElement('li');
        const button = document.createElement('button');
        button.type = 'button';
        button.textContent = r;
        button.addEventListener('click', ()=> loadReport(r));
        li.appendChild(button);
        ul.appendChild(li);
      });
    }

    refreshReports();
  </script>
</body>
</html>
